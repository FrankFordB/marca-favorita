<!DOCTYPE html>
<html>

<head>
    <title>FastAPI</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <section id="div_inicio">
  <div class="content">
    <canvas height="132" width="252" class="logo"> </canvas>
    <div class="intro-group">
    <div class="loader">
  <svg width="100" height="100" viewBox="0 0 100 100">
    <defs>
      <mask id="clipping">
        <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
        <polygon points="25,25 75,25 50,75" fill="white"></polygon>
        <polygon points="50,25 75,75 25,75" fill="white"></polygon>
        <polygon points="35,35 65,35 50,65" fill="white"></polygon>
        <polygon points="35,35 65,35 50,65" fill="white"></polygon>
        <polygon points="35,35 65,35 50,65" fill="white"></polygon>
        <polygon points="35,35 65,35 50,65" fill="white"></polygon>
      </mask>
    </defs>
  </svg>
  <div class="box"></div>
</div>

    <div class="desc">Bienvenido a el modelo de vehiculo<br>favorito de tu familia<br><button id="btn_inicio"><span>¿COMENZAMOS?</span></button></div>
    </div>
  </div>
  
</section>

<div class="div_principal" id="div_principal">
    <h1>¿Cuál es la marca preferida de autos en tu familia?</h1>
    <p></p>
    <p>{{ mayor }}</p>
    <p>{{ marcas }}</p>

    <p>{{ marcas_cantidad }} </p>

    <form method="post" action="/" id="miForm">
    <p>Ingrese las marcas de auto de su familia: </p>
        <input
            type="text"
            name="letra"
            id="Input_marcas" required 
        >

        <button type="submit">
            Enviar
        </button>
        <button>Finalizar ingresos</button>

    </form>
    <a href="/">Nuevo Ingreso</a>
</div>

    <script src="/static/js/script.js"></script>
</body>

</html>
